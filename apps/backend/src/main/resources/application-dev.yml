spring:
  devtools:
    restart:
      enabled: true
      poll-interval: 500ms
      quiet-period: 200ms
    livereload:
      enabled: true
      port: 35729
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG
    io.sentinelhooks: TRACE

management:
  endpoint:
    health:
      show-details: always
