spring:
  application:
    name: sentinel-hooks
  datasource:
    url: ${SENTINEL_DB_URL:jdbc:postgresql://localhost:5432/sentinel}
    username: ${SENTINEL_DB_USERNAME:sentinel}
    password: ${SENTINEL_DB_PASSWORD:sentinel}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
  http2:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    root: INFO
    io.sentinelhooks: DEBUG
  pattern:
    level: '%5p [traceId=%X{traceId:-} spanId=%X{spanId:-} tenantId=%X{tenantId:-}]'
